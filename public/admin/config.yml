backend:
  name: github
  repo: gstetter75-cmd/ith-region-tourism
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "de"

collections:
  - name: "wanderwege"
    label: "Wanderwege"
    folder: "src/content/wanderwege"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Bild", name: "image", widget: "image", required: false }
      - { label: "Länge (km)", name: "length_km", widget: "number", required: false }
      - { label: "Dauer (Stunden)", name: "duration_hours", widget: "number", value_type: "float", required: false }
      - label: "Schwierigkeit"
        name: "difficulty"
        widget: "select"
        options: ["Leicht", "Mittel", "Schwer"]
        default: "Mittel"
      - { label: "GPX-Datei", name: "gpx_file", widget: "file", required: false }
      - { label: "Komoot-Link", name: "komoot_url", widget: "string", required: false }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "radtouren"
    label: "Radtouren"
    folder: "src/content/radtouren"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Bild", name: "image", widget: "image", required: false }
      - { label: "Länge (km)", name: "length_km", widget: "number", required: false }
      - { label: "Dauer (Stunden)", name: "duration_hours", widget: "number", value_type: "float", required: false }
      - label: "Schwierigkeit"
        name: "difficulty"
        widget: "select"
        options: ["Leicht", "Mittel", "Schwer"]
        default: "Mittel"
      - { label: "GPX-Datei", name: "gpx_file", widget: "file", required: false }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "events"
    label: "Veranstaltungen"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort: "date:desc"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Ort", name: "location", widget: "string" }
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["Tradition", "Markt", "Wandern", "Fest", "Kultur", "Sport"]
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Bild", name: "image", widget: "image", required: false }
      - { label: "Inhalt", name: "body", widget: "markdown", required: false }

  - name: "unterkuenfte"
    label: "Unterkünfte"
    folder: "src/content/unterkuenfte"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Typ", name: "type", widget: "select", options: ["Ferienwohnung", "Pension", "Gasthof", "Camping", "Hotel"] }
      - { label: "Ort", name: "location", widget: "string" }
      - { label: "Adresse", name: "address", widget: "string", required: false }
      - { label: "Telefon", name: "phone", widget: "string", required: false }
      - { label: "E-Mail", name: "email", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Bild", name: "image", widget: "image", required: false }
      - { label: "Beschreibung", name: "body", widget: "markdown" }

  - name: "gastronomie"
    label: "Gastronomie"
    folder: "src/content/gastronomie"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Typ", name: "type", widget: "select", options: ["Restaurant", "Café", "Gasthof", "Hofladen", "Bäckerei"] }
      - { label: "Ort", name: "location", widget: "string" }
      - { label: "Adresse", name: "address", widget: "string", required: false }
      - { label: "Telefon", name: "phone", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Bild", name: "image", widget: "image", required: false }
      - { label: "Beschreibung", name: "body", widget: "markdown" }
